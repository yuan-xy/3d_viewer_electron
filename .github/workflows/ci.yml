name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install -g npm@11

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)
              npm run build:unpacked:linux
              mkdir -p dist/win-unpacked
              ln -sf "$PWD/dist/linux-unpacked/3d_viewer_electron" "dist/win-unpacked/3D_Viewer.exe"
              ;;
            Windows)
              npm run build:unpacked
              ;;
            macOS)
              npm run build:unpacked:mac
              mkdir -p dist/win-unpacked
              ln -sf "$PWD/dist/mac/3D_Viewer.app" "dist/win-unpacked/3D_Viewer.exe"
              ;;
          esac

      - name: Unit tests
        run: npx vitest run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Integration tests
        run: npx playwright test
